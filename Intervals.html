<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>running</title>
    <link rel="stylesheet" href="stryle.css">
    <link rel="js" href="interval.js">
</head>

<body>
    <div class="container_run">
        <header>
            <div class="logo"><a href="index.html">
                    <img src="images/logo.svg" alt="Logo" height="40px"></a>
            </div>
            <nav>
                <a href="diet.html">Diet</a>
                <a href="Intervals.html">Exercice</a>
            </nav>
        </header>

        <main>


            <div class="stats">

                <p>Run a minimum of 1.5 miles at a comfortable pace. Track your time. Determine your interval speeds by filling out the information below</p>



                <form>
                    Distance: <input id = "distance" type="text" > <br>
                    Duration: <input id = "time" type="text" > <br>
                    <p>How long would you like your interval work out to be</p>
                    Minutes:<input id="sessionDuration" type="text" ><br>
                    Interval: <input id="intervalLength" type="text" > <br>
                    

                    <button onclick="main()" type = "button">Go</button>

                </form>
                <h4 id="fastInterval"></h4>
                <p id="runFast"></p>
                <h4 id = slowInterval></h4>
                <p id = "runSlow"></p>
                <p id = "total"></p>

                <script src="interval.js"></script>

            </div>
        </main>
    </div>
</body>
